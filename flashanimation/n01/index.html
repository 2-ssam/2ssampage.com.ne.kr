<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>url/?=http://2ssampage.com.ne.kr/flashanimation/n01/index.html</title>

<!-- 파비콘 -->
<link rel="icon" type="image/x-icon" href="./favicon.ico?v=2">
<link rel="shortcut icon" href="./favicon.ico?v=2">

<!-- Ruffle -->
<script src="js/ruffle.js"></script>

<style>
body {
    margin: 0;
    font-family: 굴림, Gulim, Arial, sans-serif;
    background: white;
}

/* 상단 */
.top-bar {
    width: 100%;
    height: 80px;
    background-color: orange;
    position: relative;
}

.logo {
    position: absolute;
    top: 10px;
    left: 10px;
}

/* 콘텐츠 */
.content {
    height: calc(100vh - 140px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 하단 */
.bottom-bar {
    width: 100%;
    height: 60px;
    background-color: #ccc;
    text-align: center;
    line-height: 60px;
    font-size: 12px;
}
</style>

<!-- Ruffle 설정 -->
<script>
window.RufflePlayer = window.RufflePlayer || {
    config: {
        autoplay: "on",
        unmuteOverlay: "hidden"
    }
};
</script>

</head>

<body>

<!-- 상단 -->
<div class="top-bar">
    <img src="main_text_flash01.png" class="logo">
</div>

<!-- 콘텐츠 -->
<div class="content">
    <div id="container"></div>
</div>

<!-- 하단 -->
<div class="bottom-bar">
    Copyright ⓒ 2010 by 2ssampage.com.ne.kr. All rights reserved. mailto 2ssam@hanmail.net
</div>

<!-- Ruffle 실행 -->
<script>
window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    const container = document.getElementById("container");
    container.appendChild(player);

    player.style.width = "700px";
    player.style.height = "500px";

    player.load("flashswf.swf").then(() => {
        try {
            player.play();
        } catch (e) {
            console.log("브라우저가 소리 자동재생 차단함");
        }
    });
});
</script>

</body>
</html>
